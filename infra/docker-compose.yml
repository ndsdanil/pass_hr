version: '3.8'

services:
  # Nginx reverse proxy (продакшн)
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - certbot_webroot:/var/www/certbot:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - hr-plus-network

  # Фронтенд-сервис на Next.js
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend
    env_file:
      - .env
    environment:
      - NEXT_STANDALONE=true
    restart: unless-stopped
    networks:
      - hr-plus-network

  # PostgreSQL база данных
  postgres:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - hr-plus-network

  # pgadmin
  pgadmin:
    image: dpage/pgadmin4
    ports:
      - "5050:80"
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_EMAIL}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_PASSWORD}
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    restart: unless-stopped
    depends_on:
      - postgres
    networks:
      - hr-plus-network

  # Бэкенд-сервис на FastAPI
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - backend_data:/app/data
      # Монтируем app для разработки - закомментировать для production
      - ../backend/app:/app/app
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
    restart: unless-stopped
    depends_on:
      - rabbitmq
      - resume-tuner
      - postgres
    networks:
      - hr-plus-network

  # RabbitMQ для асинхронной обработки задач
  rabbitmq:
    image: rabbitmq:3-management-alpine
    hostname: rabbitmq
    ports:
      - "5672:5672"   # AMQP протокол
      - "15672:15672" # Management UI
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_DEFAULT_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_DEFAULT_PASS}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: unless-stopped
    networks:
      - hr-plus-network

  # Сервис оптимизации резюме (в режиме RabbitMQ)
  resume-tuner:
    build:
      context: ../resume-tuner
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    volumes:
      - ../resume-tuner:/app
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - RABBITMQ_HOST=${RABBITMQ_HOST}
      - RABBITMQ_USERNAME=${RABBITMQ_USERNAME}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD}
      - RABBITMQ_QUEUE=resume_tuning_queue
      - RABBITMQ_RESULTS_QUEUE=resume_tuning_results_queue
    command: python resume_generator.py --rabbitmq
    restart: unless-stopped
    depends_on:
      - rabbitmq
    networks:
      - hr-plus-network


# Сети для коммуникации между сервисами
networks:
  hr-plus-network:
    driver: bridge

# Тома для хранения данных
volumes:
  rabbitmq_data:
  backend_data:
  postgres_data:
  pgadmin_data:
  certbot_webroot: